version: '3.9'

# Java application services only.
# Requires infrastructure to be running first.
# Command: docker-compose -f docker-compose.apps.yml up --build

services:

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: pmk-api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      PMK_PATIENT_SERVICE_URL: http://patient-service:8081
      PMK_PAYMENT_SERVICE_URL: http://payment-service:8082
      PMK_SETTLEMENT_SERVICE_URL: http://settlement-service:8083
      PMK_NOTIFICATION_SERVICE_URL: http://notification-service:8084
      PMK_JWT_SECRET: "pmk-secret-key-must-be-at-least-32-chars-long"
    depends_on:
      - patient-service
      - payment-service
      - settlement-service
      - notification-service
    networks:
      - pmk-net

  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: pmk-patient-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:sqlserver://mssql:1433;databaseName=pmk_patient;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "Pmk@Str0ng!"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PMK_MOCK_GATEWAY_URL: http://mock-gateway-service:8090
    networks:
      - pmk-net

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: pmk-payment-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:sqlserver://mssql:1433;databaseName=pmk_payment;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "Pmk@Str0ng!"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: pmk_redis_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PMK_MOCK_GATEWAY_URL: http://mock-gateway-service:8090
    networks:
      - pmk-net

  settlement-service:
    build:
      context: ./settlement-service
      dockerfile: Dockerfile
    container_name: pmk-settlement-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:sqlserver://mssql:1433;databaseName=pmk_settlement;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "Pmk@Str0ng!"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: pmk_redis_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PMK_MOCK_GATEWAY_URL: http://mock-gateway-service:8090
      PMK_PAYMENT_SERVICE_URL: http://payment-service:8082
    networks:
      - pmk-net

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: pmk-notification-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:sqlserver://mssql:1433;databaseName=pmk_notification;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "Pmk@Str0ng!"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - pmk-net

networks:
  pmk-net:
    external: true
