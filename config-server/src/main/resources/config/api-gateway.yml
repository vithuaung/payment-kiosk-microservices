spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

pmk:
  mock-gateway:
    url: ${PMK_MOCK_GATEWAY_URL:http://localhost:8090}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
