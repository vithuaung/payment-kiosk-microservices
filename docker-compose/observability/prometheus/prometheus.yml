global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'api-gateway:8080' ]

  - job_name: patient-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'patient-service:8081' ]

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'payment-service:8082' ]

  - job_name: settlement-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'settlement-service:8083' ]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'notification-service:8084' ]
