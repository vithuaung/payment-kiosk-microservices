version: '3.9'

# Application services only.
# Requires infrastructure to be running first:
#   docker compose -f docker-compose/default/docker-compose.yml up -d
#
# Start apps:
#   docker compose -f docker-compose/default/docker-compose.apps.yml up --build -d

services:

  api-gateway:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    container_name: pmk-api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      OTEL_SERVICE_NAME: api-gateway
      SPRING_CONFIG_IMPORT_URL: http://configserver:8888/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
      PMK_MOCK_GATEWAY_URL: http://mock-gateway-service:8090
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/pmk/protocol/openid-connect/certs
    restart: on-failure
    extends:
      file: common-config.yml
      service: microservice-otel-config

  patient-service:
    build:
      context: ../../patient-service
      dockerfile: Dockerfile
    container_name: pmk-patient-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      OTEL_SERVICE_NAME: patient-service
      SPRING_CONFIG_IMPORT_URL: http://configserver:8888/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
      SPRING_DATASOURCE_URL: jdbc:sqlserver://mssql:1433;databaseName=pmk_patient;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "Pmk@Str0ng!"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PMK_MOCK_GATEWAY_URL: http://mock-gateway-service:8090
    restart: on-failure
    extends:
      file: common-config.yml
      service: microservice-otel-config

  payment-service:
    build:
      context: ../../payment-service
      dockerfile: Dockerfile
    container_name: pmk-payment-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      OTEL_SERVICE_NAME: payment-service
      SPRING_CONFIG_IMPORT_URL: http://configserver:8888/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
      SPRING_DATASOURCE_URL: jdbc:sqlserver://mssql:1433;databaseName=pmk_payment;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "Pmk@Str0ng!"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: pmk_redis_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PMK_MOCK_GATEWAY_URL: http://mock-gateway-service:8090
    restart: on-failure
    extends:
      file: common-config.yml
      service: microservice-otel-config

  settlement-service:
    build:
      context: ../../settlement-service
      dockerfile: Dockerfile
    container_name: pmk-settlement-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      OTEL_SERVICE_NAME: settlement-service
      SPRING_CONFIG_IMPORT_URL: http://configserver:8888/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
      SPRING_DATASOURCE_URL: jdbc:sqlserver://mssql:1433;databaseName=pmk_settlement;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "Pmk@Str0ng!"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: pmk_redis_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PMK_MOCK_GATEWAY_URL: http://mock-gateway-service:8090
    restart: on-failure
    extends:
      file: common-config.yml
      service: microservice-otel-config

  notification-service:
    build:
      context: ../../notification-service
      dockerfile: Dockerfile
    container_name: pmk-notification-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      OTEL_SERVICE_NAME: notification-service
      SPRING_CONFIG_IMPORT_URL: http://configserver:8888/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
      SPRING_DATASOURCE_URL: jdbc:sqlserver://mssql:1433;databaseName=pmk_notification;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "Pmk@Str0ng!"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: on-failure
    extends:
      file: common-config.yml
      service: microservice-otel-config

networks:
  pmk-net:
    external: true
