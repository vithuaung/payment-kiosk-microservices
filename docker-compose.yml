version: '3.9'

# Infrastructure only.
# Start this first before running apps.
# Command: docker-compose up -d

services:

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pmk-mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Pmk@Str0ng!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./docker/mssql/init.sql:/init.sql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Pmk@Str0ng!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pmk-net

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pmk-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
        /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P 'Pmk@Str0ng!' -i /init.sql -C
      "
    volumes:
      - ./docker/mssql/init.sql:/init.sql
    networks:
      - pmk-net
    restart: "no"

  redis:
    image: redis:7.2-alpine
    container_name: pmk-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass pmk_redis_pass
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "pmk_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pmk-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: pmk-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pmk-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: pmk-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - pmk-net

  mock-gateway-service:
    build:
      context: ./mock-gateway-service
      dockerfile: Dockerfile
    container_name: pmk-mock-gateway
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
    networks:
      - pmk-net

volumes:
  mssql_data:

networks:
  pmk-net:
    driver: bridge
