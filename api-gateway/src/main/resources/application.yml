server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

pmk:
  jwt:
    secret: ${PMK_JWT_SECRET:pmk-secret-key-must-be-at-least-32-chars-long}
    expiry-ms: 3600000
  auth:
    api-key: ${PMK_AUTH_API_KEY:pmk-dev-api-key}

  patient-service:
    url: ${PMK_PATIENT_SERVICE_URL:http://localhost:8081}
  payment-service:
    url: ${PMK_PAYMENT_SERVICE_URL:http://localhost:8082}
  settlement-service:
    url: ${PMK_SETTLEMENT_SERVICE_URL:http://localhost:8083}
  notification-service:
    url: ${PMK_NOTIFICATION_SERVICE_URL:http://localhost:8084}
  mock-gateway:
    url: ${PMK_MOCK_GATEWAY_URL:http://localhost:8090}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.conversion.pmk: DEBUG
    org.springframework.cloud.gateway: INFO
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"
